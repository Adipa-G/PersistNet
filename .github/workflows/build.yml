name: PersistNet
run-name: Build and Test

on: [push, workflow_dispatch]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Install report generator tool
        run: dotnet tool install --global dotnet-reportgenerator-globaltool

      - name: Restore dependencies
        run: dotnet restore PersistNet.sln

      - name: Build
        run: dotnet build PersistNet.sln --no-restore

      - name: Test
        run: dotnet test PersistNet.sln --no-build --logger trx --collect:"XPlat Code Coverage"

      - name: Test report
        uses: dorny/test-reporter@v1
        if: always()
        with:
          name: test-results
          path: "**/*.trx"
          reporter: dotnet-trx
          fail-on-error: true

      - name: Generate coverage report
        uses: danielpalme/ReportGenerator-GitHub-Action@5.1.12
        with:
          reports: "**/coverage.cobertura.xml"
          targetdir: TestResults/coverage

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: code-coverage
          path: TestResults/coverage/**/*.html

  publish-to-nuget:
    runs-on: ubuntu-latest
    needs: build-and-test
    if: github.ref == 'refs/heads/master'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'
        env:
          NUGET_AUTH_TOKEN: ${{ secrets.NUGET_TOKEN }}

      - name: Restore dependencies
        run: dotnet restore PersistNet.sln

      - name: Build (Release)
        run: dotnet build src/PersistNet/PersistNet.csproj --configuration Release --no-restore

      - name: Pack
        run: dotnet pack src/PersistNet/PersistNet.csproj --configuration Release --no-build --output ./nupkg

      - name: Publish to NuGet
        run: dotnet nuget push ./nupkg/*.nupkg -k ${{ secrets.NUGET_TOKEN }} --skip-duplicate -s https://api.nuget.org/v3/index.json
